# dbt Analytics Component with materialization-based automation policies
# - Views: code_version_changed | newly_updated (refresh on code change)
# - Mart tables: on_cron daily at 6 AM UTC
# - Other tables: on_cron hourly
#
# Each model is tagged with `dagster/materialization` based on its dbt config,
# enabling programmatic selection in schedules and jobs.
type: dbt_automation_demo.defs.analytics.component.CustomDbtComponent

attributes:
  project:
    project_dir: "{{ project_root }}/analytics_dbt"
    profiles_dir: "{{ project_root }}/analytics_dbt"
  translation_settings:
    enable_dbt_views_as_virtual_assets: true
  
---
# Hourly schedule for dbt tables (excluding views)
# Uses the `dagster/materialization` tag to programmatically select only tables
type: dbt_automation_demo.defs.components.safe_scheduled_job_component.ScheduledJobComponent

attributes:
  job_name: "hourly_dbt_tables_job"
  cron_schedule: "0 * * * *"  # Every hour on the hour
  asset_selection: "tag:dagster/materialization=table"  # Programmatically select tables, exclude views

---
# Full lineage job: seeds → staging views → intermediate views → CLV mart
# Materializes the entire chain from root sources through 3 intermediate view
# layers to the final customer_lifetime_value table
type: dbt_automation_demo.defs.components.safe_scheduled_job_component.ScheduledJobComponent

attributes:
  job_name: "clv_full_lineage_job"
  cron_schedule: "0 6 * * *"  # Daily at 6 AM UTC
  asset_selection: '+key:"customer_lifetime_value"'  # All upstream + the mart itself


---
type: dbt_automation_demo.defs.components.safe_scheduled_job_component.ScheduledJobComponent

attributes:
    job_name: "clv_seed_to_mart_job"
    cron_schedule: "0 6 * * *"
    asset_selection: 'key:"raw_customers" or key:"customer_lifetime_value"'


---
type: dbt_automation_demo.defs.components.safe_scheduled_job_component.ScheduledJobComponent

attributes:
    job_name: "seed_to_scoring_report_job"
    cron_schedule: "0 6 * * *"
    asset_selection: 'key:"raw_customers" or key:"customer_scoring_report"'

---
type: dbt_automation_demo.defs.components.safe_scheduled_job_component.ScheduledJobComponent

attributes:
    job_name: "python_asset_to_dbt_table_job"
    cron_schedule: "0 6 * * *"
    asset_selection: 'key:"external/customer_demographics" or key:"customer_lifetime_value"'

---
type: dbt_automation_demo.defs.components.safe_scheduled_job_component.ScheduledJobComponent

attributes:
    job_name: "python_asset_and_dbt_seed_to_dbt_table_and_python_asset_job"
    cron_schedule: "0 6 * * *"
    asset_selection: 'key:"external/customer_demographics" or key:"raw_customers" or key:"customer_lifetime_value" or key:"customer_scoring_report"'
